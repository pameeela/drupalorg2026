"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Carousel
description: A draggable, peeking slide carousel with a clickable feature-title nav. Place Slide components in the Slides slot.
group: Layout
props:
  type: object
  properties:
    autoplay:
      type: boolean
      title: Autoplay
      description: Auto-advance slides until the visitor interacts.
      default: true
      examples:
        - true
    slides_per_view:
      type: string
      title: Slides per view
      description: How many slides are visible across the carousel (the active one is centered, with the rest peeking).
      enum:
        - "1"
        - "2"
        - "3"
      meta:enum:
        "1": "1 (centered with peek)"
        "2": "2"
        "3": "3"
      default: "1"
      examples:
        - "1"
slots:
  header:
    title: Header
    description: Element-level badge and heading shown above the carousel (not part of a slide).
  slides:
    title: Slides
    description: Place Slide components here.
