"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Section
group: Layout
status: stable
props:
  type: object
  required:
    - columns
    - mobile_columns
    - width
    - margin_block_start
    - margin_block_end
    - padding_block_start
    - padding_block_end
  properties:
    width:
      type: string
      title: Grid width
      enum:
        - "100%"
        - "90%"
        - "80%"
        - "70%"
        - "60%"
        - "50%"
      default: "100%"
      examples:
        - "100%"
    columns:
      type: string
      title: Columns
      description: Layout selected applies on desktop and tablet.
      enum:
        - "1 column"
        - "2 columns"
        - "3 columns"
        - "4 columns"
        - "5 columns"
        - "6 columns"
        - "2 columns 75%-25%"
        - "2 columns 25%-75%"
        - "2 columns 67%-33%"
        - "2 columns 33%-67%"
        - "3 columns 50%-25%-25%"
        - "3 columns 25%-25%-50%"
      examples:
        - "2 columns"
      default:
        - "2 columns"
    views_columns:
      type: string
      title: Views grid
      description: If you are using a view in this section, select the grid layout.
      enum:
        - "50-50"
        - "33-33-33"
        - "25-25-25-25"
    mobile_columns:
      type: string
      title: Columns on mobile
      enum:
        - "1"
        - "2"
        - "3"
      examples:
        - "1"
    margin_block_start:
      type: string
      title: Margin top
      enum:
        - "0"
        - small
        - default
        - large
      meta:enum:
        "0": None
        small: Small
        default: Default
        large: Large
      examples:
        - "default"
    margin_block_end:
      type: string
      title: Margin bottom
      enum:
        - "0"
        - small
        - default
        - large
      meta:enum:
        "0": None
        small: Small
        default: Default
        large: Large
      examples:
        - "default"
    padding_block_start:
      type: string
      title: Padding top
      enum:
        - "0"
        - small
        - default
        - large
      meta:enum:
        "0": None
        small: Small
        default: Default
        large: Large
      examples:
        - "0"
    padding_block_end:
      type: string
      title: Padding bottom
      enum:
        - "0"
        - small
        - default
        - large
      meta:enum:
        "0": None
        small: Small
        default: Default
        large: Large
      examples:
        - "0"
    background_color:
      type: string
      title: Background color
      enum:
        - dark
        - light-grey
        - light-blue
        - darkest-blue
      meta:enum:
        dark: Navy blue
        light-grey: Light grey
        light-blue: Light blue
        darkest-blue: Darkest blue
    background_media:
      $ref: json-schema-definitions://canvas.module/image
      title: Background image
      type: object
    stagger_items:
      type: boolean
      title: Stagger grid items
    section_header:
      type: boolean
      title: Show header region
      examples:
        - true
      default:
        - true
    center_header:
      type: boolean
      title: Center header content
      examples:
        - false
    section_footer:
      type: boolean
      title: Show footer region
      examples:
        - true
      default:
        - true

slots:
  header_slot:
    title: "Header"
  main_slot:
    title: "Grid"
  footer_slot:
    title: "Footer"
