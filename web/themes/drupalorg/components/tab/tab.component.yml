"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Tab
description: A single tab within a Tabs component. Provides its nav label and a panel.
group: Layout
props:
  type: object
  required:
    - title
  properties:
    title:
      type: string
      title: Title
      description: Used as the tab's nav label and the panel heading.
      examples:
        - "One-click site templates"
    icon:
      type: string
      title: Icon
      description: 'The ID of an icon from the <a href="https://phosphoricons.com" target="_blank">Phosphor Icons</a> library.'
      default: "squares-four"
      examples:
        - "squares-four"
slots:
  content:
    title: Content
    description: Left column — heading-supporting text and calls to action.
  media:
    title: Media
    description: Right column — image, video, or other media.
