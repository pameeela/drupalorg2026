$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Button
group: Base
status: stable
props:
  type: object
  required:
    - variant
  properties:
    variant:
      type: string
      title: Colour
      enum:
        - primary
        - white
      meta:enum:
        primary: Brand blue
        navy: Brand navy
        white: White
      examples:
        - primary
    label:
      type: string
      title: Label
      default: "Button label"
      examples:
        - "Drupal for Marketers"
    href:
      type: string
      title: Link
      format: uri-reference
    icon:
      type: string
      title: Icon
      enum:
        - arrow-right
        - arrow-left
        - caret-right
        - caret-left
        - download
        - user-plus
      meta:enum:
        arrow-right: Arrow right
        arrow-left: Arrow left
        caret-right: Caret right
        caret-left: Caret left
        download: Download
        user-plus: User plus
      examples:
        - arrow-right
    disabled:
      type: boolean
      title: Disabled
      default: false
      examples:
        - false
        - true
