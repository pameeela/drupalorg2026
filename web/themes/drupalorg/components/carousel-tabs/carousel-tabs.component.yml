"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Tabbed carousel
description: A draggable, peeking slide carousel whose slides are navigated by clickable feature titles. Place Slide components in the Slides slot.
group: Layout
props:
  type: object
  properties:
    autoplay:
      type: boolean
      title: Autoplay
      description: Auto-advance slides until the visitor interacts.
      default: true
      examples:
        - true
slots:
  header:
    title: Header
    description: Element-level badge and heading shown above the carousel (not part of a slide).
  slides:
    title: Slides
    description: Place Slide components here.
