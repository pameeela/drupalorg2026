"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Stat counter
status: stable
group: Base
props:
  type: object
  required:
    - value
    - text_size
    - text_color
  properties:
    value:
      type: integer
      title: Value
      minimum: 1
      examples:
        - 48000
    prefix:
      type: string
      title: Prefix
      examples:
        - "~"
    suffix:
      type: string
      title: Suffix
      examples:
        - "+"
    text_size:
      type: string
      title: Text size
      enum:
        - default
        - heading-responsive-8xl
        - heading-responsive-7xl
        - heading-responsive-6xl
        - heading-responsive-5xl
        - heading-responsive-4xl
        - heading-responsive-3xl
        - heading-responsive-2xl
        - heading-responsive-xl
        - heading-responsive-lg
      meta:enum:
        default: Default
        heading-responsive-8xl: 8XL
        heading-responsive-7xl: 7XL
        heading-responsive-6xl: 6XL
        heading-responsive-5xl: 5XL
        heading-responsive-4xl: 4XL
        heading-responsive-3xl: 3XL
        heading-responsive-2xl: 2XL
        heading-responsive-xl: XL
        heading-responsive-lg: L
      examples:
        - heading-responsive-4xl
    text_color:
      type: string
      title: Text color
      enum:
        - default
        - inverted
        - primary
        - drupal-blue
      meta:enum:
        default: Default
        inverted: Inverted text
        primary: Brand navy
        drupal-blue: Drupal blue
      examples:
        - default
