"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Testimonial card
group: Card
props:
  type: object
  required:
    - align
    - style
  properties:
    text:
      type: string
      title: Quote text
      pattern: "(.|\\r?\\n)*"
      examples:
        - "My career’s guidance was crucial in helping me understand the tech industry landscape and ultimately secure my role."
    cite_name:
      type: string
      title: Citation name
      examples:
        - "Isiah Julio"
    cite_position:
      type: string
      title: Citation position
    cite_text:
      type: string
      title: Link text
    cite_url:
      type: string
      title: Link
      format: uri-reference
    align:
      type: string
      title: Alignment
      enum:
        - center
        - left
      default: center
      examples:
        - center
    style:
      type: string
      title: Style
      enum:
        - light
        - dark
      meta:enum:
        light: Light
        dark: Dark
      examples:
        - light
    media:
      $ref: json-schema-definitions://canvas.module/image
      title: Image
      type: object
      examples:
        - src: "assets/portrait.png"
          alt: "Placeholder"
          width: 100
          height: 100
