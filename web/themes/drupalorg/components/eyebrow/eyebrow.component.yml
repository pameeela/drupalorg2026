"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Eyebrow
group: Base
status: stable
props:
  type: object
  required:
    - text_color
  properties:
    eyebrow_text:
      type: string
      title: Eyebrow text
      examples:
        - Eyebrow label
    text_color:
      type: string
      title: Text color
      enum:
        - default
        - inverted
        - primary
        - drupal-blue
        - drupal-dark-blue
        - dark-gray
      meta:enum:
        default: Default
        inverted: Inverted text
        primary: Brand navy
        drupal-blue: Drupal blue
        drupal-dark-blue: Drupal dark blue
        dark-gray: Dark gray
      examples:
        - drupal-dark-blue
