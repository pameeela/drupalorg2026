"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Card
group: Card
props:
  type: object
  required:
    - heading_text
    - style
  properties:
    style:
      type: string
      title: Style
      enum:
        - classic
        - featured
      meta:enum:
        classic: Classic
        featured: Featured
      examples:
        - classic
    heading_text:
      type: string
      title: Heading
      examples:
        - "The best CMS for agents to use"
    level:
      type: number
      title: Heading level
      enum:
        - 2
        - 3
        - 4
      default: 3
      examples:
        - 3
    text:
      type: string
      title: Description
      pattern: "(.|\\r?\\n)*"
      examples:
        - "Any MCP-compatible agent connects to Drupal directly — reading content models, creating pages, managing media, respecting permissions. No Drupal knowledge required. Every action queued for human review."
    media:
      $ref: json-schema-definitions://canvas.module/image
      title: Image
      type: object
      examples:
        - src: "assets/jj-ying-8bghKxNU1j0-unsplash.jpg"
          width: 1200
          height: 900
          alt: "Photo by jjying: https://unsplash.com/photos/purple-and-blue-light-digital-wallpaper-8bghKxNU1j0"
    url:
      type: string
      title: Button link
      format: uri-reference
    cta_text:
      type: string
      title: Button label
      examples:
        - "Drupal for AI Builders"
