"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Badge
group: Base
status: stable
props:
  type: object
  required:
    - label
    - style
  properties:
    label:
      type: string
      title: Label
      examples:
        - "Built for your whole team"
    style:
      type: string
      title: Style
      enum:
        - transparent
        - transparent-inverse
        - white
        - dark
      meta:enum:
        transparent: Transparent
        transparent-inverse: Transparent (on dark)
        white: White
        dark: Dark
      examples:
        - transparent
